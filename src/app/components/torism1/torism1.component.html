<section class="station-header position-relative">
    <div class="overlay"></div>

    <div class="header-content text-center position-absolute top-50 start-50 translate-middle">
        <h1 class="station-name fw-bold text-white display-5">خدمات المحطة</h1>
        <p class="lead text-light">تبعد 2.3 كم</p>
    </div>
</section>

<section class="container-fluid p-3" id="services" dir="rtl">
    <div class=" top-actions div d-flex justify-content-between align-items-center">
        <button
            class="btn btn-outline-success bi-arrow-bar-left d-flex flex-row-reverse justify-content-center align-items-center fw-bold"
            routerLink="/app-torism">رجوع</button>
        <button
            class="btn btn-outline-success bi-arrow-bar-left d-flex flex-row-reverse justify-content-center align-items-center fw-bold"
            routerLink="/home">الصفحة الرئيسية</button>
    </div>

    <h1 class="text-center  gradient-text-head ">
      محطة شرق العلمين
        <img src="../../../assets/images/customer-service.png" class="Image-customer">
        <hr>
    </h1>
    <div class="row">
        <div class="col-lg-8">
            <div class="row g-2 mb-4">
                @for (services2 of services2; track services2.title) {
                <div class="  col-lg-3">
                    <div class="service-box p-3 text-center shadow-md rounded-4 bg-white">
                        <i [class]="services2.icon + ' fs-4'"></i>
                        <p class="mt-2 fw-semibold">
                            {{ services2.title }}
                        </p>

                        <button class="btn btn-outline-primary mt-2 w-75 rounded-5 fw-bold"
                            [routerLink]="services2.route">
                            التفاصيل
                        </button>

                    </div>
                </div>
                }
            </div>
            <hr>
            <h2 class="fw-bold mt-4 top-actions2 ">
                الموقع <span class="bi-award"></span></h2>
            <hr>
            <div class="map-container rounded-4 overflow-hidden shadow-md">
                <div id="map" style="height:300px; width:100%"></div>
                <button
                    class="btn btn-outline-secondary fw-bold mx-auto d-block w-50 text-info-emphasis mt-4 bi bi-geo-alt-fill d-flex flex-row-reverse justify-content-center align-items-center"
                    (click)="openGoogleMaps()">الاتجاهات</button>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="info-box p-4 shadow-lg rounded-4 bg-white">
                <h3 class="fw-bold mb-3">معلومات المحطة</h3>
                <p class="text-success fw-medium"><i class="fa-regular fa-clock"></i> مفتوح 24 ساعة</p>
                <p class="fw-medium"><i class="fa-solid fa-phone text-primary"></i> 010 123 4567</p>
                <p class="fw-medium"><i class="fa-solid fa-diamond-turn-right"></i>مدينة العلمين، مارينا العلمين، محافظة مطروح 5080001</p>
                <hr>
                <h6 class="section-title fw-bold">
                    المعرض
                    <i class="bi bi-badge-hd"></i>
                </h6>
                <hr>
                <section class="container mt-5">
                    <div id="galleryCarousel" class="carousel slide rounded-4 shadow-sm" data-bs-ride="carousel"
                        data-bs-interval="3000">
                        <!-- المؤشرات -->
                        <div class="carousel-indicators">
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="0"
                                class="active"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="1"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="2"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="3"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="4"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="5"></button>
                            <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="6"></button>
                        </div>
                        <!-- الصور -->
                        <div class="carousel-inner rounded-4">
                            <div class="carousel-item active">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AHVAwepCDqqS-DyzCg-zNX0rcxTXXM8JvwsqVfGCUupwRjyLMKvbG72918jiBhQCn25KRjXIVG7wYPfrY7lHdh0avZZ7yTNn7XrjRETopvRwpRvzTReUQ7jxgoyLtTIrB6-KPfhRU0X7ig=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                            <div class="carousel-item">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AHVAwepY4W3OE7JumB4YwsAJhQsONxPR0UV4kFb-fG16-HOuinNrtAt5o47irFtImznc5eQJIF9DimsrO-Zc0J0n3HLMV1P__x9jS4tZ8urrugPIyOmNHhtZx29RpxZ2NlfpJTtdzeOuH2i5X-0y=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                            <div class="carousel-item">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AHVAweoNSiLt3F8qoWFh3gHjrf6Vek8bxugjZCwh1XOWriAGsSLX6NEr61CcAEszwuPXVrrAaclOYSC9P_oVPbCxkfGiJyumkDk5ljGDY3Q_71j8e7nmr_Nfjca8mjTIA31p0SM-lVyWbrx5DW6K=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                            <div class="carousel-item">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AG0ilSw5BIY6VDtLecKa4HTx6RbrLwiUSy-6gezblKubZJW2xUnXZ0riHNIQTa-dcTKLxAVuZzih6g18tDlko0ILDtvz8lnTnpzKAJyNSRke6KfulrCRDj9GRiv5iriAjjivjTjtNfZx=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                            <div class="carousel-item">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AG0ilSzUWfEKzt_ksLBQvpGHfInbulUSJ6WP-qJFDvgErKqEnbQMfX6x_C1zw9twvzB78hPA-ueUJrT5OJKiTMIuZRhSKdOrqb35kZ6y47bGTf2IAzvNKJATnCPzNPLXCoroFAkaostr4A=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                            <div class="carousel-item">
                                <img src="https://lh3.googleusercontent.com/gps-cs-s/AG0ilSwPoXA_j9-lRk-OVMRAwHbOWCvlvTXEnW7FEF2YZ_0zNapTbSKalK2J2am8mxIieU6NKH30ofykAidxCnLAR7GkFOzxON1Z1THInGjRKDPAqukfy_nvwnmJLBCOwLZBB0xkf7jI=s680-w680-h510-rw"
                                    class="d-block w-100 rounded-4">
                            </div>
                        </div>
                        <!-- أزرار التحكم -->
                        <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel"
                            data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">السابق</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel"
                            data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">التالي</span>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>
</section>
